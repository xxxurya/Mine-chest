services:
  - name: api
    type: web
    repo: https://github.com/xxxurya/Mine-chest.git
    branch: master
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    dockerCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  - name: frontend
    type: web
    repo: https://github.com/xxxurya/Mine-chest.git
    branch: master
    rootDir: frontend
    dockerfilePath: frontend/Dockerfile
    dockerCommand: npm run dev
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://api-your-app.onrender.com
